name: Sync Active Inventory from DMS

on:
  # Refresh nightly at 11:00 PM EST (04:00 UTC), matching the DMS daily
  # refresh. We intentionally do NOT sync on push: regenerating the snapshot
  # on every push/merge produced competing data/inventory.json commits and
  # constant merge conflicts. Nightly + manual keeps it fresh without churn.
  schedule:
    - cron: "0 4 * * *"
  # Allow manual runs from the Actions tab (e.g. after new stock arrives).
  workflow_dispatch:

# Allow the job to commit the refreshed snapshot back to the repo.
permissions:
  contents: write

# Never run two syncs at once.
concurrency:
  group: "inventory-sync"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync inventory from DMS
        env:
          # Stores to include (comma-separated). Defaults to the Pennsylvania
          # locations — T1 Hatfield, T3 Long Pond (Pocono), T5 Scranton.
          # Override by setting a DMS_STORE_IDS repo variable (empty = all).
          DMS_STORE_IDS: ${{ vars.DMS_STORE_IDS || 'T1,T3,T5' }}
        run: node scripts/sync-inventory.mjs

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/inventory.json; then
            echo "No inventory changes to commit."
          else
            git add data/inventory.json
            git commit -m "chore: refresh active inventory snapshot from DMS"
            git push
          fi
